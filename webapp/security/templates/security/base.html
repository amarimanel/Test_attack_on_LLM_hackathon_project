{% load django_bootstrap5 %}
<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}LLM Security Shield{% endblock %}</title>
    {% bootstrap_css %}
    <style>
        /* Palette Cyber/Dark Moderne */
        body { 
            background-color: #0b0f19; /* Bleu très sombre */
            color: #e2e8f0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
        }
        .navbar { 
            background-color: #111827 !important; 
            border-bottom: 1px solid #1f2937; 
        }
        
        /* Cartes stylisées avec effet au survol */
        .card { 
            background-color: #111827; 
            border: 1px solid #1f2937; 
            border-radius: 12px;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease; 
        }
        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            border-color: #6366f1; /* Accent violet/bleu */
        }
        
        /* Boutons personnalisés "Néon" */
        .btn-neon { 
            background-color: transparent; 
            color: #6366f1; 
            border: 2px solid #6366f1; 
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2); 
            transition: all 0.3s; 
        }
        .btn-neon:hover { 
            background-color: #6366f1; 
            color: white; 
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.6); 
        }

        /* Texte dégradé pour les titres */
        .text-gradient { 
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-5 py-3 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-gradient" href="{% url 'home' %}">
                🛡️ LLM Shield
            </a>
            <div class="navbar-nav ms-auto gap-3">
                <a class="nav-link" href="{% url 'home' %}">Accueil</a>
                <a class="nav-link" href="{% url 'test' %}">Scanner</a>
                <a class="nav-link" href="{% url 'stats' %}">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>

    {% bootstrap_javascript %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
